name: Sync PR Labels from Linked Issues

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  issues: read
  pull-requests: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Copy labels from linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (!pr?.number) {
              console.log("No PR number found.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Fresh PR body
            const { data: prDataFresh } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number
            });

            const body = prDataFresh.body || "";

            // Matching
            const strictMatches = [...body.matchAll(/(fixes|closes|resolves)\s*:?\s+#(\d+)/gi)]
              .map(m => Number(m[2]));

            const looseMatches = [...body.matchAll(/(?:^|\s)#(\d+)\b/g)]
              .map(m => Number(m[1]));

            const issueNumbers = [...new Set(
              [...strictMatches, ...looseMatches]
                .filter(n => Number.isInteger(n) && n !== pr.number)
            )];

            if (issueNumbers.length === 0) {
              console.log("No linked issues found.");
              return;
            }

            // PR labels
            const { data: prData } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number
            });

            const existingLabels = prData.labels.map(l => l.name);

            let labelsToAdd = [];

            // Parallel fetch
            const issueResults = await Promise.allSettled(
              issueNumbers.map(issue_number =>
                github.rest.issues.get({ owner, repo, issue_number })
              )
            );

            for (let i = 0; i < issueResults.length; i++) {
              const result = issueResults[i];
              const issue_number = issueNumbers[i];

              if (result.status === "fulfilled") {
                // Skip PRs (only use real issues)
                if (!result.value.data.pull_request) {
                  const issueLabels = result.value.data.labels.map(l => l.name);
                  labelsToAdd.push(...issueLabels);
                }
              } else {
                console.log(`Issue #${issue_number} error: ${result.reason.message}`);
              }
            }

            // Deduplicate + filter
            labelsToAdd = [...new Set(labelsToAdd)]
              .filter(l => l && !existingLabels.includes(l));

            if (labelsToAdd.length === 0) {
              console.log("No new labels to add.");
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: labelsToAdd
            });

            console.log(`Added ${labelsToAdd.length} labels:`, labelsToAdd);
