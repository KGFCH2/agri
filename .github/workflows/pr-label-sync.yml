name: Sync PR Labels from Linked Issues

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  issues: read
  pull-requests: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Copy labels from linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ✅ Match BOTH:
            // 1. Fixes/Closes/Resolves #123
            // 2. Any #123
            const strictMatches = [...body.matchAll(/(fixes|closes|resolves)\s+#(\d+)/gi)].map(m => parseInt(m[2]));
            const looseMatches = [...body.matchAll(/#(\d+)/g)].map(m => parseInt(m[1]));

            // Merge + remove duplicates
            const issueNumbers = [...new Set([...strictMatches, ...looseMatches])];

            if (issueNumbers.length === 0) {
              console.log("No linked issues found.");
              return;
            }

            // 📥 Get PR existing labels
            const { data: prData } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number
            });

            const existingLabels = prData.labels.map(l => l.name);

            let labelsToAdd = [];

            for (const issue_number of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number
                });

                const issueLabels = issue.labels.map(l => l.name);

                labelsToAdd.push(...issueLabels);

              } catch (err) {
                console.log(`Issue #${issue_number} not found or error.`);
              }
            }

            // Remove duplicates + already existing labels
            labelsToAdd = [...new Set(labelsToAdd)].filter(l => !existingLabels.includes(l));

            if (labelsToAdd.length === 0) {
              console.log("No new labels to add.");
              return;
            }

            // 🏷️ Apply labels
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: labelsToAdd
            });

            console.log("Labels added:", labelsToAdd);
