name: Sync PR Labels and Assignees from Linked Issues

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  issues: read
  pull-requests: write

jobs:
  sync-pr-data:
    runs-on: ubuntu-latest

    steps:
      - name: Copy labels and assignees from linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (!pr?.number) {
              console.log("No PR number found.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get fresh PR body
            const { data: prDataFresh } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number
            });

            const body = prDataFresh.body || "";

            // Match linked issues
            const strictMatches = [...body.matchAll(/(fixes|closes|resolves)\s*:?\s+#(\d+)/gi)]
              .map(m => Number(m[2]));

            const looseMatches = [...body.matchAll(/(?:^|\s)#(\d+)\b/g)]
              .map(m => Number(m[1]));

            const issueNumbers = [...new Set(
              [...strictMatches, ...looseMatches]
                .filter(n => Number.isInteger(n) && n !== pr.number)
            )];

            if (issueNumbers.length === 0) {
              console.log("No linked issues found.");
              return;
            }

            // Existing PR labels + assignees
            const { data: prIssueData } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number
            });

            const existingLabels = prIssueData.labels.map(l => l.name);
            const existingAssignees = prIssueData.assignees.map(a => a.login);

            let labelsToAdd = [];
            let assigneesToAdd = [];

            // Fetch linked issues
            const issueResults = await Promise.allSettled(
              issueNumbers.map(issue_number =>
                github.rest.issues.get({
                  owner,
                  repo,
                  issue_number
                })
              )
            );

            for (let i = 0; i < issueResults.length; i++) {
              const result = issueResults[i];
              const issue_number = issueNumbers[i];

              if (result.status === "fulfilled") {
                const issue = result.value.data;

                // Skip linked PRs
                if (!issue.pull_request) {

                  // Labels
                  const issueLabels = issue.labels.map(l => l.name);
                  labelsToAdd.push(...issueLabels);

                  // Assignees
                  const issueAssignees = issue.assignees.map(a => a.login);
                  assigneesToAdd.push(...issueAssignees);
                }

              } else {
                console.log(`Issue #${issue_number} error: ${result.reason.message}`);
              }
            }

            // Deduplicate labels
            labelsToAdd = [...new Set(labelsToAdd)]
              .filter(l => l && !existingLabels.includes(l));

            // Deduplicate assignees
            assigneesToAdd = [...new Set(assigneesToAdd)]
              .filter(a => a && !existingAssignees.includes(a));

            // Add labels
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: labelsToAdd
              });

              console.log(`Added labels: ${labelsToAdd.join(", ")}`);
            } else {
              console.log("No new labels to add.");
            }

            // Add assignees
            if (assigneesToAdd.length > 0) {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: pr.number,
                assignees: assigneesToAdd
              });

              console.log(`Added assignees: ${assigneesToAdd.join(", ")}`);
            } else {
              console.log("No new assignees to add.");
            }
