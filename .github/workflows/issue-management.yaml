name: Prevent Unauthorized Issue Closing

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  reopen-if-needed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const allowedUsers = ["Eshajha19"];

            const issue = context.payload.issue;
            const closedBy = context.actor;

            if (allowedUsers.includes(closedBy)) {
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: "open"
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: "❌ This issue cannot be closed by contributors. Only maintainers are allowed to close issues."
            });
